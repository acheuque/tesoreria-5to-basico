<!DOCTYPE html>
<html>
<head>
    <title>🎯 Tesorería 5to Básico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        :root {
            --cambridge-blue: #003876;
            --cambridge-red: #E31E24;
            --cambridge-yellow: #FDB913;
            --light-blue: #E8F1F8;
        }
        
        body {
            font-family: 'Comic Neue', cursive;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--light-blue);
            background-image: radial-gradient(rgba(0, 56, 118, 0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                font-size: 14px;
            }

            .amount {
                font-size: 24px !important;
            }

            .label {
                font-size: 16px !important;
            }

            .financial-summary, .cuotas-box, .egresos-box, .ingresos-adicionales-box, .codigos-search-box {
                padding: 15px !important;
            }
            .cuotas-table, .egresos-table, .ingresos-adicionales-table, .codigos-result-table {
                font-size: 14px;
            }

            .cuotas-table th,
            .cuotas-table td,
            .egresos-table th,
            .egresos-table td,
            .ingresos-adicionales-table th,
            .ingresos-adicionales-table td,
            .codigos-result-table th,
            .codigos-result-table td {
                padding: 8px !important;
            }

            .egresos-table, .ingresos-adicionales-table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            h1 {
                font-size: 24px !important;
            }

            .emoji {
                font-size: 20px !important;
            }

            .piggy-bank {
                font-size: 36px !important;
            }
        }

        .codigos-search-box {
            background-color: white;
            border: 3px solid var(--cambridge-blue);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 56, 118, 0.2);
            margin-top: 20px;
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.15s;
        }

        .codigos-search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
        }

        .codigos-result-table .codigos-retrasadas {
            color: #c62828;
            font-weight: bold;
        }

        .codigos-search-input {
            flex: 1;
            min-width: 160px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 16px;
            border: 2px solid var(--cambridge-blue);
            border-radius: 12px;
            box-sizing: border-box;
        }

        .codigos-search-input:disabled {
            opacity: 0.6;
        }

        .codigos-search-btn {
            padding: 12px 24px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: var(--cambridge-blue);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 56, 118, 0.25);
        }

        .codigos-search-btn:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        .codigos-search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .codigos-result-wrap {
            margin-top: 20px;
            min-height: 1em;
        }

        .codigos-result-table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 56, 118, 0.1);
        }

        .codigos-result-table th,
        .codigos-result-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .codigos-result-table th {
            background-color: var(--cambridge-blue);
            color: white;
            font-weight: bold;
        }

        .codigos-result-table tr:nth-child(even) {
            background-color: #f5f5f5;
        }

        .codigos-result-msg {
            color: var(--cambridge-blue);
            font-size: 18px;
            margin-top: 8px;
        }

        .codigos-result-msg.error {
            color: var(--cambridge-red);
        }

        .easter-egg-layer {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 10000;
            pointer-events: none;
            transform: translateX(calc(100% + 48px));
            transition: transform 0.4s ease-out;
        }

        .easter-egg-layer--in {
            transform: translateX(0);
        }

        .easter-egg-layer--out {
            transform: translateX(calc(100% + 48px));
            transition: transform 0.4s ease-in;
        }

        .easter-egg-img {
            display: block;
            max-width: min(512px, calc(100vw - 32px));
            max-height: min(512px, calc(100vh - 32px));
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            /* box-shadow: 0 8px 28px rgba(0, 56, 118, 0.35); */
        }

        .financial-summary {
            background-color: white;
            border: 3px solid var(--cambridge-blue);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 56, 118, 0.2);
            margin-top: 20px;
            animation: float 6s ease-in-out infinite;
        }

        .cuotas-box {
            background-color: white;
            border: 3px solid var(--cambridge-blue);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 56, 118, 0.2);
            margin-top: 30px;
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.3s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .amount-container {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 15px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .amount-container:hover {
            transform: scale(1.02);
        }

        .ingresos {
            background-color: rgba(253, 185, 19, 0.15);
            border: 2px solid var(--cambridge-yellow);
        }

        .egresos {
            background-color: rgba(227, 30, 36, 0.15);
            border: 2px solid var(--cambridge-red);
        }

        .amount {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            color: var(--cambridge-blue);
        }

        .label {
            color: var(--cambridge-blue);
            font-size: 20px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .balance {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px dashed var(--cambridge-blue);
            animation: rainbow 10s linear infinite;
        }

        @keyframes rainbow {
            0% { border-color: var(--cambridge-blue); }
            33% { border-color: var(--cambridge-red); }
            66% { border-color: var(--cambridge-yellow); }
            100% { border-color: var(--cambridge-blue); }
        }

        h1 {
            color: var(--cambridge-blue);
            text-align: center;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .emoji {
            font-size: 24px;
            margin-right: 8px;
        }

        .piggy-bank {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Money rain animation styles */
        .money {
            position: fixed;
            font-size: 48px;
            user-select: none;
            pointer-events: none;
            z-index: -1;
            will-change: transform;
        }

        /* Golden coin style */
        .money.coin {
            filter: 
                brightness(1.1)
                sepia(0.8)
                saturate(1.5)
                hue-rotate(320deg);
            text-shadow: 
                0 0 5px rgba(255, 200, 0, 0.5),
                0 0 10px rgba(255, 180, 0, 0.3);
        }

        /* Money container to help with positioning */
        .money-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .cuotas-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px dashed var(--cambridge-blue);
        }

        .cuotas-table, .egresos-table, .ingresos-adicionales-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 56, 118, 0.1);
            table-layout: fixed;
        }

        .cuotas-table th,
        .cuotas-table td,
        .egresos-table th,
        .egresos-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .egresos-table th,
        .egresos-table td {
            text-align: left;
        }

        .cuotas-table th:first-child,
        .egresos-table th:first-child,
        .cuotas-table td:first-child,
        .egresos-table td:first-child {
            width: 120px;
        }

        .egresos-table th:nth-child(2),
        .egresos-table td:nth-child(2) {
            width: 120px;
        }

        .egresos-table th:last-child,
        .egresos-table td:last-child {
            width: auto;
        }

        .cuotas-table th,
        .egresos-table th {
            background-color: var(--cambridge-blue);
            color: white;
            font-weight: bold;
        }

        .cuotas-table tr:nth-child(even) {
            background-color: #f5f5f5;
        }

        .cuotas-table .pagadas {
            color: #2e7d32;
            font-weight: bold;
        }

        .cuotas-table .pendientes {
            color: var(--cambridge-red);
            font-weight: bold;
        }

        .cuotas-table tr:hover,
        .egresos-table tr:hover {
            background-color: #f0f7ff;
        }

        .fecha {
            white-space: nowrap;
        }

        .egresos-table .monto,
        .ingresos-adicionales-table .monto {
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
            white-space: nowrap;
        }

        .egresos-table .glosa,
        .ingresos-adicionales-table .glosa {
            width: 100%;
            word-wrap: break-word;
        }

        .egresos-box,
        .ingresos-adicionales-box {
            background-color: white;
            border: 3px solid var(--cambridge-blue);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 56, 118, 0.2);
            margin-top: 30px;
            animation: float 6s ease-in-out infinite;
            animation-delay: 0.9s;
        }

        .ingresos-adicionales-table th,
        .ingresos-adicionales-table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #e0e0e0;
        }

        .ingresos-adicionales-table th {
            background-color: var(--cambridge-blue);
            color: white;
            font-weight: bold;
        }

        .ingresos-adicionales-table th:first-child,
        .ingresos-adicionales-table td:first-child {
            width: 120px;
        }

        .ingresos-adicionales-table th:nth-child(2),
        .ingresos-adicionales-table td:nth-child(2) {
            width: 120px;
        }

        .ingresos-adicionales-table th:last-child,
        .ingresos-adicionales-table td:last-child {
            width: auto;
        }

        .ingresos-adicionales-table tr:hover {
            background-color: #f0f7ff;
        }

        @media (max-width: 600px) {
            .cuotas-table, 
            .egresos-table,
            .ingresos-adicionales-table {
                font-size: 14px;
                display: table;
                width: 100%;
                min-width: 100%;
                table-layout: fixed;
                border-radius: 8px;
            }

            .cuotas-box,
            .egresos-box,
            .ingresos-adicionales-box,
            .codigos-search-box {
                padding: 15px !important;
                overflow: hidden;
            }

            .cuotas-table th,
            .cuotas-table td,
            .egresos-table th,
            .egresos-table td,
            .ingresos-adicionales-table th,
            .ingresos-adicionales-table td {
                padding: 8px !important;
            }

            .egresos-table th:first-child,
            .egresos-table td:first-child,
            .ingresos-adicionales-table th:first-child,
            .ingresos-adicionales-table td:first-child {
                width: 90px;
            }

            .egresos-table th:nth-child(2),
            .egresos-table td:nth-child(2),
            .ingresos-adicionales-table th:nth-child(2),
            .ingresos-adicionales-table td:nth-child(2) {
                width: 90px;
            }

            .egresos-table .glosa,
            .ingresos-adicionales-table .glosa {
                min-width: 120px;
                max-width: 200px;
            }

            .egresos-table .glosa,
            .ingresos-adicionales-table .glosa {
                min-width: 150px;
                max-width: 200px;
            }

            h1 {
                font-size: 24px !important;
            }

            .emoji {
                font-size: 20px !important;
            }

            .piggy-bank {
                font-size: 36px !important;
            }
        }
    </style>
</head>
<body>
    <div class="money-container"></div>
    
    <h1>🎯 Tesorería 5to Básico 🎯</h1>
    
    <div class="piggy-bank">
        🐷
    </div>

    <div id="codigos-search-container" class="codigos-search-box">
        <div class="label">
            <span class="emoji">🔎</span>
            Consultar cuotas
        </div>
        <div class="codigos-search-row">
            <input type="text" id="codigo-search-input" class="codigos-search-input" placeholder="Escribe un código..." autocomplete="off" disabled aria-label="Código a buscar">
            <button type="button" id="codigo-search-btn" class="codigos-search-btn" disabled>Buscar</button>
        </div>
        <div id="codigos-result" class="codigos-result-wrap" aria-live="polite"></div>
    </div>

    <div class="financial-summary">
        <div class="amount-container ingresos">
            <div class="label">
                <span class="emoji">💰</span>
                Total Ingresos
            </div>
            <div id="ingresos" class="amount">Cargando...</div>
        </div>
        
        <div class="amount-container egresos">
            <div class="label">
                <span class="emoji">🛍️</span>
                Total Egresos
            </div>
            <div id="egresos" class="amount">Cargando...</div>
        </div>

        <div class="balance">
            <div class="label">
                <span class="emoji">🎯</span>
                Balance Final
            </div>
            <div id="balance" class="amount">Cargando...</div>
        </div>
    </div>

    <div id="cuotas-container" class="cuotas-box">
        <div class="label">
            <span class="emoji">📊</span>
            Estado de Cuotas
        </div>
        <div id="cuotas-loading" class="amount">Cargando...</div>
    </div>

    <div id="egresos-container" class="egresos-box">
        <div class="label">
            <span class="emoji">📝</span>
            Detalle de Egresos
        </div>
        <div id="egresos-loading" class="amount">Cargando...</div>
    </div>

    <div id="ingresos-adicionales-container" class="ingresos-adicionales-box">
        <div class="label">
            <span class="emoji">📊</span>
            Detalle de Ingresos Adicionales
        </div>
        <div id="ingresos-adicionales-loading" class="amount">Cargando...</div>
    </div>

    <div>
        <img src="https://cheuque.cl/tesoreria-images/pikachu.png" alt="Pikachu" width="1" height="1">
        <img src="https://cheuque.cl/tesoreria-images/charmander.png" alt="Charmander" width="1" height="1">
        <img src="https://cheuque.cl/tesoreria-images/squirtle.png" alt="Squirtle" width="1" height="1">
        <img src="https://cheuque.cl/tesoreria-images/bulbasaur.png" alt="Bulbasaur" width="1" height="1">
    </div>
    <script src="script.js"></script>
    <script>
        function createMoney() {
            const money = document.createElement('div');
            money.className = 'money';
            
            // Randomly choose between bill and coin
            const isCoin = Math.random() < 0.4; // 40% chance of being a coin
            money.textContent = isCoin ? '🪙' : '💵';
            
            if (isCoin) {
                money.classList.add('coin');
                money.style.fontSize = '38px';
            }
            
            // Random horizontal position
            const startPosition = Math.random() * (window.innerWidth - 100);
            money.style.left = startPosition + 'px';
            
            // Duration between 10-15 seconds
            const duration = 10000 + Math.random() * 5000;
            
            const animate = () => {
                const startTime = Date.now();
                
                const tick = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;
                    
                    if (progress >= 1) {
                        money.remove();
                        return;
                    }
                    
                    // Simple sine wave movement
                    const x = Math.sin(progress * Math.PI * 2) * 100;
                    const y = progress * window.innerHeight;
                    
                    // Simple rotation
                    const rotation = progress * 360;
                    
                    money.style.transform = `
                        translate(${x}px, ${y}px)
                        rotate(${rotation}deg)
                    `;
                    
                    requestAnimationFrame(tick);
                };
                
                tick();
            };
            
            document.querySelector('.money-container').appendChild(money);
            animate();
        }

        // Create new money every 800ms
        setInterval(createMoney, 800);

        // Create initial set of money
        for(let i = 0; i < 6; i++) {
            setTimeout(createMoney, Math.random() * 2000);
        }
    </script>
</body>
</html>
